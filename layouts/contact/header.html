{{- $breakpoint := $.Scratch.Get "breakpoint" -}}

<div class="container-xxl p-4 px-xxl-0 d-{{ $breakpoint.current }}-none mt-5">
    {{ with .Title}}<p class="display-5">{{ . }}</p>{{ end }}
    {{ with .Params.function | default .Description }}<p class="lead"><strong>{{ . }}</strong></p>{{ end }}
</div>
