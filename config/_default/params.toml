[favicon]
    logo = "img/favicon.png"
    sizes = [16, 32, 48]

[style]
    themeOpacity = "10"
    darkModeShade = "20%"
    darkModeTint = "40%"
    themeFont = "Hind"
    themeFontPath = "/fonts" # local path
    themeFontPreload = "/fonts/hind-v16-latin-regular.woff2"
    fontSizeBase = "1.1rem"
    purge = true

[schema]
    type = "Organization"
    name = "Hinode"
    locale = "en-US"
    # twitter = "https://twitter.com/gethinode"
    # linkedIn = ""
    github = "https://github.com/gethinode/hinode"
    section = "blog"
    [author]
        name = "Mark Dumay"
        # twitter = "https://twitter.com/markdumay"
        linkedin = "https://www.linkedin.com/in/markdumay/"
        github = "https://github.com/markdumay"
    [logo]
        url = "img/logo512x512.png"
        width = 512
        height = 512
    [image]
        url = "img/logo1280x640.png"
        width = 1280
        height = 640

[opengraph]
    images = ["logo.png"]
    locale = "en_US"

[links]
    hinode = "https://gethinode.com"

# provide default hero settings
[modules.bookshop.hero]
  align = "start"
  backdrop = "/assets/img/nat-9l98kFByiao-unsplash.jpg"
  overlayMode = "dark"
  section = true
  default = ["page", "home", "section"]

[pages]
    [pages.blog]
        header = "full"
    [pages.cases]
        header = "full"
