[main]
    separator = "-"
    description = "Hinode is a clean documentation and blog theme for your Hugo site based on Bootstrap 5."
    canonifyAssetsURLs = false
    endorse = false
    footerBelowFold = true
    loading = "lazy"
    breakpoint = "md"
    [main.padding]
        x = 4
        y = 5
    [main.externalLinks]
        cue = true
        tab = true
    [main.build]
        transpiler = "dartsass"
        silenceDeprecations = true
    [main.colorMode]
        enabled = true
        modes = ["light", "dark"]
        toggle = true

[icons]
    # Color mode toggle
    colorModeLight       = "sun"
    colorModeDark        = "moon-stars"
    # Navbar
    navbarLanguage       = "globe2"
    navbarOverflow       = "three-dots"
    navbarVersionCheck   = "check"
    # Pagination
    paginationFirst      = "chevron-double-left"
    paginationPrev       = "chevron-left"
    paginationNext       = "chevron-right"
    paginationLast       = "chevron-double-right"
    # Other navigation
    breadcrumbBack       = "chevron-left"
    pageNavPrev          = "arrow-left"
    pageNavNext          = "arrow-right"
    # Content
    tocSort              = "sort-down"
    cardReadMore         = "chevron-right"
    externalLink         = "box-arrow-up-right"
    testimonialNext      = "chevron-right"
    testimonialQuote     = "quote"
    headingAnchor        = "link"
    notFoundPage         = "link-45deg"
    sharingWebshare      = "share"
    sharingDownload      = "download"
    # Search (mod-flexsearch)
    search          = "search"
    # Testimonial carousel controls (mod-blocks)
    carouselPrev    = "chevron-left"
    carouselNext    = "chevron-right"
    # CTA and contact action links (mod-blocks)
    ctaAction       = "chevron-right"
    # Preview component device tabs and error state (mod-blocks)
    previewDesktop  = "display"
    previewTablet   = "tablet"
    previewMobile   = "phone"
    previewError    = "exclamation-triangle"
    [icons.admonition]
        note       = "info-circle"
        info       = "info-circle"
        tip        = "lightbulb"
        important  = "exclamation"
        warning    = "exclamation-triangle"
        caution    = "hand-index-thumb"
    [icons.release]
        deprecated = "trash"
        feature    = "rocket-takeoff"

[debugging]
    showJS = false
    showSCSS = false
    purgeHTMLComments = false

[docs]
    github = "https://github.com/gethinode/hinode"
    release = "https://github.com/gethinode/hinode/releases/tag/"
    checkVersion = false

[home]
    # sections = ["posts"]
    fullCover = true
    centerHeadline = false
    style = ""

[footer]
    logo = "/img/logo-mono-light.svg"
    mode = true

[navigation]
    anchor = true
    logo = "/img/logo_icon_purple.svg"
    color = ""
    transparent = true
    fixed = true
    offset = "5.7rem"
    offsetXS = "5.7rem"
    overlay = true
    overlayMode = "dark"
    breadcrumb = true
    toc = true
    sidebar = true
    size = "lg"
    fontsizeCollapsed = 2
    [navigation.language]
        inline = true
    [navigation.search]
        enabled = true
        modal = true

[messages]
    placement = "bottom-right"

[sharing]
    enabled = true
    sort = "weight"
    reverse = false
    webshare = true

[[sharing.providers]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/sharing/share-offsite/?url={url}"
    icon = "fab linkedin"
    weight = 10

[[sharing.providers]]
    name = "Twitter"
    url = "https://twitter.com/home?status={url}"
    icon = "fab x-twitter"
    weight = 20

[[sharing.providers]]
    name = "Facebook"
    url = "https://www.facebook.com/sharer.php?u={url}"
    icon = "fab facebook"
    weight = 30

[[sharing.providers]]
    name = "WhatsApp"
    url = "whatsapp://send?text={title}%20{url}"
    icon = "fab whatsapp"
    weight = 40

[[sharing.providers]]
    name = "email"
    url = "{url}"
    icon = "fas link"
    weight = 50
    clipboard = true

[connect]
    enabled = true
    sort = "weight"
    reverse = false
    webshare = true

[[connect.providers]]
    name = "LinkedIn"
    label = "LinkedIn"
    url = "{value}"
    icon = "fab linkedin"
    weight = 10

[[connect.providers]]
    name = "Email"
    label = "Email"
    url = "{value}"
    icon = "fa envelope"
    weight = 20
    form = true

[favicon]
    logo = "img/favicon.png"
    sizes = [16, 32, 48]

[style]
    themeOpacity = "10"
    darkModeShade = "20%"
    darkModeTint = "40%"
    themeFont = "Hind"
    themeFontPath = "/fonts" # local path
    themeFontPreload = "/fonts/hind-v16-latin-regular.woff2"
    fontSizeBase = "1.1rem"
    purge = true

[schema]
    type = "Organization"
    name = "Hinode"
    locale = "en-US"
    # twitter = "https://twitter.com/gethinode"
    # linkedIn = ""
    github = "https://github.com/gethinode/hinode"
    section = "blog"
    [author]
        name = "Mark Dumay"
        # twitter = "https://twitter.com/markdumay"
        linkedin = "https://www.linkedin.com/in/markdumay/"
        github = "https://github.com/markdumay"
    [logo]
        url = "img/logo512x512.png"
        width = 512
        height = 512
    [image]
        url = "img/logo1280x640.png"
        width = 1280
        height = 640

[opengraph]
    images = ["logo.png"]
    locale = "en_US"

[links]
    hinode = "https://gethinode.com"

[modules]
    [modules.cookieyes]
        url = "https://cdn-cookieyes.com/client_data/a54b5553f349dd13bd225f8e/script.js"
    [modules.fontawesome]
        defaultFamily = "bi"
    [modules.flexsearch]
        frontmatter = true
        filter = "content_blocks"
    [modules.blocks.about]
        ratio = "1x1"
    [modules.blocks.hero]
        backdrop = "/assets/img/nat-9l98kFByiao-unsplash.jpg"
    [modules.blocks.articles]
        class = "border-0 card-zoom"

[pages]
    readingTime = true
    wordCount = true
