[main]
    separator = "-"
    description = "Hinode Business is a versatile business theme powered by Hugo and Bootstrap 5."
    enableDarkMode = true
    modes = ["light", "dark"]
    canonifyAssetsURLs = false
    endorse = false
    footerBelowFold = true
    loading = "lazy"
    breakpoint = "md"
    [main.externalLinks]
        cue = false
        tab = false
    [main.build]
        transpiler = "libsass"

[modules]
    [modules.flexsearch]
        frontmatter = true
        filter = "content_blocks"
    [modules.bookshop.title]
        preheadingPlacement = "above"


[debugging]
    showJS = false
    showSCSS = false
    purgeHTMLComments = false

[docs]
    github = "https://github.com/gethinode/hinode"
    release = "https://github.com/gethinode/hinode/releases/tag/"
    checkVersion = false

[home]
    # sections = ["posts"]
    fullCover = true
    centerHeadline = false
    style = ""

[footer]
    logo = "/img/logo-mono-light.svg"
    mode = true

[navigation]
    anchor = true
    logo = "/img/logo_icon_purple.svg"
    color = "body"
    fixed = true
    offset = "5.5rem"
    overlay = true
    overlayMode = "dark"
    search = true
    searchModal = true
    breadcrumb = true
    toc = true
    sidebar = true
    size = "md"

[messages]
    placement = "bottom-right"

[sharing]
    enabled = true
    sort = "weight"
    reverse = false
    webshare = true

[[sharing.providers]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/sharing/share-offsite/?url={url}"
    icon = "fab linkedin"
    weight = 10

[[sharing.providers]]
    name = "Twitter"
    url = "https://twitter.com/home?status={url}"
    icon = "fab x-twitter"
    weight = 20

[[sharing.providers]]
    name = "Facebook"
    url = "https://www.facebook.com/sharer.php?u={url}"
    icon = "fab facebook"
    weight = 30

[[sharing.providers]]
    name = "WhatsApp"
    url = "whatsapp://send?text={title}%20{url}"
    icon = "fab whatsapp"
    weight = 40

[[sharing.providers]]
    name = "email"
    url = "{url}"
    icon = "fas link"
    weight = 50
    clipboard = true

[connect]
    enabled = true
    sort = "weight"
    reverse = false
    webshare = true

[[connect.providers]]
    name = "LinkedIn"
    label = "LinkedIn"
    url = "{value}"
    icon = "fab linkedin"
    weight = 10

[[connect.providers]]
    name = "Email"
    label = "Email"
    url = "{value}"
    icon = "fa envelope"
    weight = 20
    form = true

